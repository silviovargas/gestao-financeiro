<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F6E56">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GF Ballet">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil — Gestão Financeira SL</title>
<link rel="stylesheet" href="/css/global.css">
<style>
.profile-wrap { max-width: 540px; }
.profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
.profile-card-head { padding: .875rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.profile-card-head h3 { font-size: 14px; font-weight: 600; }
.profile-card-body { padding: 1.25rem; }

.avatar-lg {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--primary-l); border: 3px solid var(--primary-b);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: var(--primary);
  flex-shrink: 0;
}

/* Tema */
.theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
.theme-opt {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; padding: 8px 4px;
  border-radius: 10px; border: 2px solid transparent;
  transition: all .15s;
}
.theme-opt:hover { background: var(--bg); }
.theme-opt.selected { border-color: var(--primary); background: var(--primary-l); }
.theme-dot { width: 36px; height: 36px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,.15); transition: transform .15s; }
.theme-opt:hover .theme-dot { transform: scale(1.1); }
.theme-lbl { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.3; }
.theme-opt.selected .theme-lbl { color: var(--primary); font-weight: 600; }

.divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">

    <div class="page-header">
      <h1>👤 Meu Perfil</h1>
    </div>

    <div class="page-body">
      <div class="profile-wrap">

        <!-- Informações pessoais -->
        <div class="profile-card">
          <div class="profile-card-head">
            <span style="font-size:18px">👤</span>
            <h3>Informações pessoais</h3>
          </div>
          <div class="profile-card-body">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem">
              <div class="avatar-lg" id="avatarEl">—</div>
              <div>
                <div style="font-size:16px;font-weight:600" id="nameEl">—</div>
                <div style="font-size:12px;color:var(--muted);margin-top:3px" id="emailEl">—</div>
                <div style="margin-top:6px">
                  <span class="badge badge-primary" id="roleEl">—</span>
                </div>
              </div>
            </div>

            <div class="field">
              <label class="lbl">Nome de exibição</label>
              <input type="text" id="fName" placeholder="Seu nome">
            </div>

            <div class="divider"></div>
            <div style="font-size:12px;font-weight:600;margin-bottom:.75rem">🔑 Alterar senha</div>

            <div class="field">
              <label class="lbl">Senha atual</label>
              <input type="password" id="fCurPwd" placeholder="Deixe em branco para não alterar">
            </div>
            <div class="field-row">
              <div class="field">
                <label class="lbl">Nova senha</label>
                <input type="password" id="fNewPwd" placeholder="Mín. 6 caracteres">
              </div>
              <div class="field">
                <label class="lbl">Confirmar</label>
                <input type="password" id="fCfmPwd" placeholder="Repita">
              </div>
            </div>

            <div id="profileErr" class="alert alert-error" style="display:none;margin-top:.75rem"></div>
            <div style="margin-top:1rem">
              <button class="btn btn-primary" onclick="saveProfile()">Salvar alterações</button>
            </div>
          </div>
        </div>

        <!-- Tema de cores -->
        <div class="profile-card">
          <div class="profile-card-head">
            <span style="font-size:18px">🎨</span>
            <h3>Tema de cores</h3>
          </div>
          <div class="profile-card-body">
            <div style="font-size:12px;color:var(--muted);margin-bottom:.5rem">
              Escolha a cor principal do sistema. Salvo na sua conta e aplicado em todos os dispositivos.
            </div>
            <div class="theme-grid" id="themeGrid"></div>
            <div style="margin-top:1rem">
              <button class="btn btn-primary" onclick="saveTheme()">💾 Aplicar tema</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
if (!Auth.requireLogin()) throw '';
buildSidebar('perfil');

let selectedTheme = Auth.theme();

// Montar grid de temas
function buildGrid() {
  document.getElementById('themeGrid').innerHTML = Object.entries(THEMES).map(([key, t]) => `
    <div class="theme-opt ${key === selectedTheme ? 'selected' : ''}"
         onclick="selectTheme('${key}')" data-key="${key}">
      <div class="theme-dot" style="background:${t.p}"></div>
      <div class="theme-lbl">${t.label}</div>
    </div>
  `).join('');
}

function selectTheme(key) {
  selectedTheme = key;
  document.querySelectorAll('.theme-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.key === key);
  });
  applyTheme(key); // preview instantâneo
}

async function saveTheme() {
  try {
    await API.put('/profile/theme', { theme_color: selectedTheme });
    localStorage.setItem('gf_theme', selectedTheme);
    showToast('Tema aplicado!', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

// Carregar perfil
async function loadProfile() {
  try {
    const u = await API.get('/profile');
    document.getElementById('nameEl').textContent  = u.name;
    document.getElementById('emailEl').textContent = u.email;
    document.getElementById('avatarEl').textContent = Fmt.initials(u.name);
    document.getElementById('fName').value = u.name;
    const roles = { admin:'Administrador', gestor:'Gestor', operacional:'Operacional' };
    document.getElementById('roleEl').textContent = roles[u.role] || u.role;
    if (u.theme_color) {
      selectedTheme = u.theme_color;
      localStorage.setItem('gf_theme', u.theme_color);
      applyTheme(u.theme_color);
      buildGrid();
    }
  } catch(e) { showToast('Erro ao carregar perfil', 'error'); }
}

async function saveProfile() {
  const name   = document.getElementById('fName').value.trim();
  const curPwd = document.getElementById('fCurPwd').value;
  const newPwd = document.getElementById('fNewPwd').value;
  const cfmPwd = document.getElementById('fCfmPwd').value;
  const errEl  = document.getElementById('profileErr');
  errEl.style.display = 'none';

  if (!name) { errEl.textContent = 'Nome obrigatório.'; errEl.style.display = 'flex'; return; }
  if (newPwd && newPwd !== cfmPwd) { errEl.textContent = 'As senhas não coincidem.'; errEl.style.display = 'flex'; return; }
  if (newPwd && newPwd.length < 6) { errEl.textContent = 'Senha mínimo 6 caracteres.'; errEl.style.display = 'flex'; return; }

  try {
    const body = { name };
    if (newPwd) { body.currentPassword = curPwd; body.newPassword = newPwd; }
    await API.put('/profile', body);
    // Atualizar nome no storage
    const u = Auth.user(); u.name = name;
    const key = localStorage.getItem('gf_token') ? 'gf_user' : 'ballet_user';
    localStorage.setItem(key, JSON.stringify(u));
    document.getElementById('nameEl').textContent = name;
    document.getElementById('avatarEl').textContent = Fmt.initials(name);
    ['fCurPwd','fNewPwd','fCfmPwd'].forEach(id => document.getElementById(id).value = '');
    showToast('Perfil atualizado!', 'success');
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'flex'; }
}

buildGrid();
loadProfile();
</script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(e=>console.warn(e));}</script>
</body>
</html>
